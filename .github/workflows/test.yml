name: test

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  smoke:
    name: ${{ matrix.os }} / ${{ matrix.version }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, macos-latest, windows-latest]
        version:
          - 14.3.rel1        # modern: all 4 runner platforms
          - 10.3-2021.10     # newest gnu-rm: win, linux-amd64, linux-arm64, darwin-amd64
          - 9-2019-q4-major  # gnu-rm: win, linux-amd64, linux-arm64, darwin-amd64
          - 7-2017-q4-major  # mid-era gnu-rm: win, linux-amd64, darwin-amd64
          - 5-2016-q1-update # oldest gnu-rm: linux-amd64, darwin-amd64
        # Skip combos that ARM never published a build for. The exclude
        # list is mechanically derived from internal/arm/legacy.go in
        # the armup repo — every gnu-rm entry's platform map.
        exclude:
          # No gnu-rm release shipped a darwin-arm64 build. ARM only
          # added Apple Silicon support in the modern arm-gnu-toolchain
          # line. macos-latest is M-series, so any gnu-rm version
          # there has nothing to install.
          - { os: macos-latest, version: 10.3-2021.10 }
          - { os: macos-latest, version: 9-2019-q4-major }
          - { os: macos-latest, version: 7-2017-q4-major }
          - { os: macos-latest, version: 5-2016-q1-update }
          # ARM only began shipping aarch64-linux from 9.x; pre-9 gnu-rm
          # versions are linux-amd64-only on Linux.
          - { os: ubuntu-24.04-arm, version: 7-2017-q4-major }
          - { os: ubuntu-24.04-arm, version: 5-2016-q1-update }
          # 5-2016-q1-update and 5-2016-q2-update were Linux + macOS
          # only on developer.arm.com (Windows was a Nullsoft installer
          # we can't extract, intentionally omitted from the catalog).
          - { os: windows-latest, version: 5-2016-q1-update }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install toolchain via setup-armup
        id: armup
        uses: ./
        with:
          version: ${{ matrix.version }}

      - name: arm-none-eabi-gcc resolves and runs
        shell: bash
        run: |
          set -euo pipefail
          which arm-none-eabi-gcc
          arm-none-eabi-gcc --version
          # The version banner should mention the requested release.
          # Match case-insensitively because GCC 14+ banners say
          # "Arm GNU Toolchain 14.3.Rel1" with a capital R.
          arm-none-eabi-gcc --version | head -1 | grep -qiF '${{ matrix.version }}'

      - name: bin-dir output is set and exists
        shell: bash
        run: |
          set -euo pipefail
          test -n "${{ steps.armup.outputs.bin-dir }}"
          test -d "${{ steps.armup.outputs.bin-dir }}"

      - name: compile a tiny program
        shell: bash
        run: |
          cat > hello.c <<'EOF'
          int main(void) { return 0; }
          EOF
          arm-none-eabi-gcc -mcpu=cortex-m4 -mthumb -nostartfiles \
            -nostdlib -Wl,--no-warn-rwx-segments -o hello.elf hello.c \
            || arm-none-eabi-gcc -mcpu=cortex-m4 -mthumb -nostartfiles \
               -nostdlib -o hello.elf hello.c
          arm-none-eabi-size hello.elf

  cache-roundtrip:
    name: cache hits on second run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: First install (populates cache)
        uses: ./
        with:
          version: 14.3.rel1
      - name: Second install (should hit cache; armup reports 'already installed')
        id: second
        uses: ./
        with:
          version: 14.3.rel1
      - name: arm-none-eabi-gcc still works
        shell: bash
        run: arm-none-eabi-gcc --version
